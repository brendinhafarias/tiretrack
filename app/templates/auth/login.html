<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TireTrack Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>body{background:#111827;font-family:'Inter','Roboto',system-ui,sans-serif;}</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-red-600 rounded-2xl mb-4">
        <span class="text-white font-bold text-2xl">TT</span>
      </div>
      <h1 class="text-2xl font-bold text-white">TireTrack Pro</h1>
      <p class="text-gray-400 text-sm mt-1">Gestão de pneus para motorsport</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div x-data class="mb-4 space-y-2">
      {% for category, message in messages %}
      <div class="px-4 py-3 rounded-lg text-sm font-medium
                  {{ 'bg-green-800 text-green-100 border border-green-600' if category == 'success' else
                     'bg-red-900 text-red-100 border border-red-700' if category == 'error' else
                     'bg-yellow-800 text-yellow-100 border border-yellow-600' }}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- Login form -->
    <div class="bg-gray-800 rounded-2xl p-8 border border-gray-700">
      <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Usuário ou E-mail</label>
          <input type="text" name="username" required autofocus
                 class="w-full px-4 py-3 bg-gray-900 border border-gray-600 rounded-xl text-white placeholder-gray-500
                        focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 text-base"
                 placeholder="admin">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Senha</label>
          <input type="password" name="password" required
                 class="w-full px-4 py-3 bg-gray-900 border border-gray-600 rounded-xl text-white placeholder-gray-500
                        focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 text-base"
                 placeholder="••••••••">
        </div>

        <button type="submit"
                class="w-full py-3 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-semibold rounded-xl
                       transition-colors text-base min-h-[48px]">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-600 mt-6">TireTrack Pro © {{ 2026 }}</p>
  </div>
</body>
</html>
